name: cicd

on: 
  workflow_dispatch: 

    inputs:
      environment:
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prd
          - staging


jobs:

  code:
    runs-on: ubuntu-slim
    steps:
      - name: write your code
        run: echo "Code is completed"
  build:
    needs: code
    runs-on: ubuntu-slim
    steps:
      - name: build your code
        run: echo "used docker to build"
  
  test:
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: test your code
        run: echo "tested on gitlab"


  deploy:
    if: inputs.environment == 'dev'
    needs: [build,test]
    runs-on: ubuntu-slim
    steps:
      - name: deploy your code
        run: echo "Code is deployed on ec2"
